<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circlan V2 - Calendar</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D9A05B',
                        secondary: '#F4EAE1',
                        dark: '#1a1a1a',
                        surface: '#ffffff',
                        muted: '#9ca3af'
                    },
                    backgroundImage: {
                        'gradient-main': 'linear-gradient(180deg, #F4EAE1 0%, #FAFAFA 100%)',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'Nunito Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'nav': '0 -1px 0 0 rgba(0,0,0,0.05)',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-main bg-fixed font-sans min-h-screen pb-24 md:pb-0 overflow-x-hidden text-gray-800 antialiased selection:bg-primary selection:text-white">

    <!-- Preloader -->
    <div id="preloader" class="fixed inset-0 z-[100] bg-white flex items-center justify-center transition-opacity duration-500 ease-out">
        <div class="relative w-16 h-16">
            <div class="absolute inset-0 border-4 border-primary/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <!-- MOBILE HEADER -->
    <header class="fixed top-0 left-0 right-0 z-40 glass h-16 flex md:hidden items-center px-5 justify-between">
        <div class="flex items-center">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center text-dark -ml-2"><i class="fa-solid fa-chevron-left text-xl"></i></a>
            <h1 class="text-xl font-bold text-dark ml-1">Calendar</h1>
        </div>
    </header>

    <!-- DESKTOP DYNAMIC SIDEBAR -->
    <nav class="hidden md:flex fixed top-0 left-0 h-screen sidebar-desktop bg-white border-r border-gray-100 flex-col py-8 shadow-sm">
        <div class="mb-10 flex items-center h-[52px] px-6">
            <h1 class="text-2xl font-bold text-dark tracking-tighter italic menu-text">Circlan</h1>
        </div>
        <div class="flex-1 space-y-2">
            <a href="index.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-solid fa-house text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Home</span>
            </a>
            <a href="calendar.html" class="nav-link-item bg-primary/10 text-primary group">
                <div class="icon-wrapper"><i class="fa-solid fa-calendar-days text-xl"></i></div>
                <span class="text-[16px] font-bold menu-text">Calendar</span>
            </a>
            <a href="notification.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper relative"><i class="fa-regular fa-heart text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Notifications</span>
            </a>
            <a href="#" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-regular fa-square-plus text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Create</span>
            </a>
            <a href="#" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-solid fa-sitemap text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Tree</span>
            </a>
            <a href="profile.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><div class="w-7 h-7 rounded-full overflow-hidden border border-gray-300 group-hover:scale-110 transition-transform shadow-sm"><img src="images/stories/small/pic1.jpg" alt="Profile" class="w-full h-full object-cover"></div></div>
                <span class="text-[16px] menu-text">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="main-container-responsive">
        <main class="pt-20 md:pt-10 px-4 max-w-[800px] mx-auto min-h-screen">
            
            <div class="flex flex-col lg:flex-row lg:space-x-8">
                
                <!-- Left: Calendar Grid -->
                <div class="flex-1 mb-8 lg:mb-0">
                    <div class="bg-white rounded-[32px] p-6 shadow-soft border border-gray-100 animate-fade-in">
                        <div class="flex items-center justify-between mb-8 px-2">
                            <h2 class="text-xl font-bold text-dark italic">Mei 2026</h2>
                            <div class="flex space-x-2">
                                <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-50 text-muted"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                                <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-50 text-muted"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                            </div>
                        </div>

                        <div class="calendar-grid mb-2">
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Min</div>
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Sen</div>
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Sel</div>
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Rab</div>
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Kam</div>
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Jum</div>
                            <div class="text-center text-[10px] font-black text-muted uppercase tracking-widest pb-4">Sab</div>
                        </div>

                        <div class="calendar-grid gap-1" id="calendar-days">
                            <!-- Days will be generated, let's mock some -->
                            <script>
                                for(let i=26; i<=30; i++) document.write(`<div class="calendar-day text-gray-200">${i}</div>`);
                                for(let i=1; i<=31; i++) {
                                    let classes = "calendar-day relative";
                                    if(i === 24) classes += " active";
                                    if([12, 24].includes(i)) classes += " has-event";
                                    document.write(`<div class="${classes}">${i}</div>`);
                                }
                            </script>
                        </div>
                    </div>
                </div>

                <!-- Right: Event Details -->
                <div class="w-full lg:w-[320px] animate-fade-in" style="animation-delay: 0.1s">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <h3 class="text-sm font-bold text-dark uppercase tracking-wider">Saved for 24 Mei</h3>
                        <span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">1 Event</span>
                    </div>

                    <div class="space-y-4" id="event-list">
                        <!-- Saved Event Card -->
                        <div class="bg-white rounded-3xl p-5 shadow-soft border border-primary/20 flex flex-col transition-all">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-10 h-10 rounded-2xl bg-secondary/50 flex items-center justify-center text-primary">
                                    <i class="fa-solid fa-users text-lg"></i>
                                </div>
                                <button class="text-primary hover:text-red-500 transition-colors btn-scale">
                                    <i class="fa-solid fa-bookmark text-lg"></i>
                                </button>
                            </div>
                            <h4 class="text-[15px] font-bold text-dark mb-1 leading-tight">Family Reunion 2026</h4>
                            <p class="text-[12px] text-muted mb-4 flex items-center font-medium leading-relaxed">
                                <i class="fa-solid fa-location-dot mr-1.5 text-[10px]"></i> Grand Ballroom, Jakarta
                            </p>
                            <div class="flex items-center space-x-2 pt-4 border-t border-gray-50 mt-auto">
                                <div class="flex -space-x-2">
                                    <img src="images/stories/small/pic2.jpg" class="w-6 h-6 rounded-full border-2 border-white object-cover">
                                    <img src="images/stories/small/pic3.jpg" class="w-6 h-6 rounded-full border-2 border-white object-cover">
                                    <div class="w-6 h-6 rounded-full bg-gray-100 border-2 border-white flex items-center justify-center text-[8px] font-bold text-muted">+8</div>
                                </div>
                                <span class="text-[10px] font-bold text-muted italic">Joining</span>
                            </div>
                        </div>

                        <!-- Empty State Example (Hidden by default or shown for other dates) -->
                        <div class="hidden py-10 text-center bg-white/30 rounded-3xl border border-dashed border-gray-200">
                            <p class="text-xs font-bold text-muted italic">No events saved for this day.</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav px-6 py-3 flex md:hidden items-center justify-between z-40 shadow-nav">
        <a href="index.html" class="text-gray-400 btn-scale"><i class="fa-solid fa-house text-2xl"></i></a>
        <a href="calendar.html" class="text-primary btn-scale relative">
            <i class="fa-solid fa-calendar-days text-2xl"></i>
            <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
        </a>
        <a href="#" class="text-gray-400 btn-scale"><i class="fa-regular fa-square-plus text-2xl"></i></a>
        <a href="#" class="text-gray-400 btn-scale"><i class="fa-solid fa-sitemap text-2xl"></i></a>
        <a href="profile.html" class="text-gray-400 btn-scale">
            <img src="images/stories/small/pic1.jpg" alt="Profile" class="w-7 h-7 rounded-full border border-gray-200">
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        // Simple Interaction logic for the Calendar Demo
        const days = document.querySelectorAll('.calendar-day:not(.text-gray-200)');
        const eventTitle = document.querySelector('h3');
        const eventCount = document.querySelector('span.bg-primary\\/10');
        const eventList = document.getElementById('event-list');

        days.forEach(day => {
            day.addEventListener('click', () => {
                days.forEach(d => d.classList.remove('active'));
                day.classList.add('active');
                
                const date = day.innerText;
                eventTitle.innerText = `Saved for ${date} Mei`;
                
                // Demo logic: Show event only for 24 and 12
                if (date === '24' || date === '12') {
                    eventCount.innerText = '1 Event';
                    eventCount.classList.remove('hidden');
                    eventList.children[0].classList.remove('hidden');
                    eventList.children[1].classList.add('hidden');
                    
                    // Update content for 12th
                    if(date === '12') {
                        eventList.querySelector('h4').innerText = "Photography Workshop";
                        eventList.querySelector('p').innerText = "Kota Tua, Jakarta";
                        eventList.querySelector('.bg-secondary\\/50 i').className = "fa-solid fa-camera text-lg";
                    } else {
                        eventList.querySelector('h4').innerText = "Family Reunion 2026";
                        eventList.querySelector('p').innerText = "Grand Ballroom, Jakarta";
                        eventList.querySelector('.bg-secondary\\/50 i').className = "fa-solid fa-users text-lg";
                    }
                } else {
                    eventCount.innerText = '0 Events';
                    eventList.children[0].classList.add('hidden');
                    eventList.children[1].classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
