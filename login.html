<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circlan V2 - Login</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D9A05B',
                        secondary: '#F4EAE1',
                        dark: '#1a1a1a',
                        surface: '#ffffff',
                        muted: '#9ca3af'
                    },
                    backgroundImage: {
                        'gradient-main': 'linear-gradient(180deg, #F4EAE1 0%, #FAFAFA 100%)',
                        'gradient-gold': 'linear-gradient(135deg, #D9A05B 0%, #B8864B 100%)',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'Nunito Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 20px 50px -12px rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-main min-h-screen flex items-center justify-center p-6 font-sans text-gray-800 antialiased">

    <!-- Preloader -->
    <div id="preloader" class="fixed inset-0 z-[100] bg-white flex items-center justify-center transition-opacity duration-500 ease-out">
        <div class="relative w-16 h-16">
            <div class="absolute inset-0 border-4 border-primary/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-[400px] animate-fade-in">
        
        <!-- Login Card -->
        <div class="bg-white rounded-[40px] p-8 md:p-10 shadow-soft border border-white/50">
            <!-- Branding Header -->
            <div class="mb-10">
                <h1 class="text-4xl font-bold text-dark tracking-tighter italic mb-1">Circlan</h1>
                <p class="text-[11px] text-gray-400 font-bold uppercase tracking-[0.2em]">Sign In</p>
            </div>
            
            <form action="index.html" class="space-y-5">
                <!-- Username Input -->
                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                            <i class="fa-regular fa-user"></i>
                        </div>
                        <input type="text" placeholder="Username" class="w-full bg-gray-50 border-2 border-transparent rounded-2xl py-4 pl-12 pr-4 focus:bg-white focus:border-primary/20 focus:ring-4 focus:ring-primary/5 transition-all outline-none text-sm font-medium">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="login-password" placeholder="Password" class="w-full bg-gray-50 border-2 border-transparent rounded-2xl py-4 pl-12 pr-12 focus:bg-white focus:border-primary/20 focus:ring-4 focus:ring-primary/5 transition-all outline-none text-sm font-medium">
                        <button type="button" id="toggle-login-pass" class="absolute inset-y-0 right-4 flex items-center text-gray-400 hover:text-primary transition-colors">
                            <i class="fa-regular fa-eye-slash"></i>
                        </button>
                    </div>
                    <div class="text-right px-1">
                        <a href="#" class="text-[11px] font-bold text-primary hover:underline">Forgot Password?</a>
                    </div>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="w-full bg-gradient-gold text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 hover:opacity-90 transition-all btn-scale transform active:scale-95 mt-2 uppercase tracking-widest text-sm">
                    Sign In
                </button>
            </form>

            <!-- Social Logins -->
            <div class="mt-8">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                    <span class="relative bg-white px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Or continue with</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center space-x-2 bg-gray-50 hover:bg-gray-100 border border-gray-100 py-3 rounded-2xl transition-all btn-scale">
                        <img src="../assets/images/icons/google.png" alt="Google" class="w-4 h-4">
                        <span class="text-xs font-bold text-dark">Google</span>
                    </button>
                    <button class="flex items-center justify-center space-x-2 bg-gray-50 hover:bg-gray-100 border border-gray-100 py-3 rounded-2xl transition-all btn-scale">
                        <img src="../assets/images/icons/facebook.png" alt="Facebook" class="w-4 h-4">
                        <span class="text-xs font-bold text-dark">Facebook</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Link -->
        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500 font-medium">
                Don't have an account? 
                <a href="register.html" class="text-primary font-bold hover:underline ml-1">Sign Up</a>
            </p>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        const passToggle = document.getElementById('toggle-login-pass');
        const passInput = document.getElementById('login-password');
        
        if (passToggle && passInput) {
            passToggle.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                passToggle.innerHTML = type === 'password' ? '<i class="fa-regular fa-eye-slash"></i>' : '<i class="fa-regular fa-eye"></i>';
            });
        }
    </script>
</body>
</html>
