<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circlan V2 - Profile</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D9A05B',
                        secondary: '#F4EAE1',
                        dark: '#1a1a1a',
                        surface: '#ffffff',
                        muted: '#9ca3af'
                    },
                    backgroundImage: {
                        'gradient-main': 'linear-gradient(180deg, #F4EAE1 0%, #FAFAFA 100%)',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'Nunito Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'nav': '0 -1px 0 0 rgba(0,0,0,0.05)',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-main bg-fixed font-sans min-h-screen pb-24 md:pb-0 overflow-x-hidden text-gray-800 antialiased selection:bg-primary selection:text-white">

    <!-- Preloader -->
    <div id="preloader" class="fixed inset-0 z-[100] bg-white flex items-center justify-center transition-opacity duration-500 ease-out">
        <div class="relative w-16 h-16">
            <div class="absolute inset-0 border-4 border-primary/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <!-- MOBILE HEADER -->
    <header class="fixed top-0 left-0 right-0 z-40 glass h-16 flex md:hidden items-center px-5 justify-between">
        <div class="flex items-center">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center text-dark -ml-2"><i class="fa-solid fa-chevron-left text-xl"></i></a>
            <h1 class="text-xl font-bold text-dark ml-1">Profile</h1>
        </div>
        <button class="text-dark"><i class="fa-solid fa-gear text-xl"></i></button>
    </header>

    <!-- DESKTOP DYNAMIC SIDEBAR -->
    <nav class="hidden md:flex fixed top-0 left-0 h-screen sidebar-desktop bg-white border-r border-gray-100 flex-col py-8 shadow-sm">
        <div class="mb-10 flex items-center h-[52px] px-6">
            <h1 class="text-2xl font-bold text-dark tracking-tighter italic menu-text">Circlan</h1>
        </div>
        <div class="flex-1 space-y-2">
            <a href="index.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-solid fa-house text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Home</span>
            </a>
            <a href="calendar.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-solid fa-calendar-days text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Calendar</span>
            </a>
            <a href="notification.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper relative">
                    <i class="fa-regular fa-heart text-xl group-hover:scale-110 transition-transform"></i>
                </div>
                <span class="text-[16px] menu-text">Notifications</span>
            </a>
            <a href="create.html" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-regular fa-square-plus text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Create</span>
            </a>
            <!-- Tree -->
            <a href="#" class="nav-link-item text-gray-500 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper"><i class="fa-solid fa-sitemap text-xl group-hover:scale-110 transition-transform"></i></div>
                <span class="text-[16px] menu-text">Tree</span>
            </a>
            <a href="profile.html" class="nav-link-item bg-primary/10 text-primary group">
                <div class="icon-wrapper">
                    <div class="w-7 h-7 rounded-full overflow-hidden border border-primary group-hover:scale-110 transition-transform shadow-sm">
                        <img src="images/stories/small/pic9.jpg" alt="Profile" class="w-full h-full object-cover">
                    </div>
                </div>
                <span class="text-[16px] font-bold menu-text">Profile</span>
            </a>
        </div>
        <div class="mt-auto">
            <a href="#" class="nav-link-item text-gray-400 hover:bg-gray-50 hover:text-dark group">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-bars text-xl group-hover:scale-110 transition-transform"></i>
                </div>
                <span class="text-[16px] menu-text">More</span>
            </a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="main-container-responsive">
        <main class="pt-20 md:pt-10 mx-auto min-h-screen max-w-[800px]">
            
            <!-- Profile Header -->
            <section class="mb-10 px-4">
                <div class="flex flex-col md:flex-row items-center md:items-start md:space-x-10">
                    <!-- Avatar -->
                    <div class="relative mb-6 md:mb-0">
                        <div class="w-28 md:w-40 h-28 md:h-40 rounded-full p-1 bg-white shadow-soft border-2 border-primary/20">
                            <img src="images/stories/small/pic9.jpg" alt="Emilla" class="w-full h-full object-cover rounded-full">
                        </div>
                        <button class="absolute bottom-1 right-1 bg-primary text-white w-8 h-8 rounded-full flex items-center justify-center border-4 border-white shadow-sm hover:scale-110 transition-transform">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                    </div>

                    <!-- Info -->
                    <div class="flex-1 text-center md:text-left">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
                            <h2 class="text-2xl font-bold text-dark mb-2 md:mb-0">M. Fayyadh Muwaffaq</h2>
                            <div class="flex space-x-2 justify-center md:justify-start">
                                <button class="bg-primary text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md shadow-primary/20 hover:bg-primary/90 transition-all btn-scale">Edit Profile</button>
                                <button class="bg-white text-dark px-4 py-2 rounded-xl text-sm font-bold border border-gray-200 hover:bg-gray-50 transition-all btn-scale">
                                    <i class="fa-solid fa-share-nodes"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-center md:justify-start space-x-8 mb-4">
                            <div class="text-center md:text-left">
                                <span class="block text-xl font-bold text-dark leading-none">42</span>
                                <span class="text-xs text-muted font-bold uppercase tracking-wider">Posts</span>
                            </div>
                            <div class="text-center md:text-left border-l border-gray-100 pl-8">
                                <span class="block text-xl font-bold text-dark leading-none">12</span>
                                <span class="text-xs text-muted font-bold uppercase tracking-wider">Circles</span>
                            </div>
                            <div class="text-center md:text-left border-l border-gray-100 pl-8">
                                <span class="block text-xl font-bold text-dark leading-none">1.2k</span>
                                <span class="text-xs text-muted font-bold uppercase tracking-wider">Impact</span>
                            </div>
                        </div>

                        <p class="text-sm text-gray-600 mb-4 leading-relaxed max-w-md">
                            Architect by day, photographer by soul. Exploring urban circles and capturing the pulse of the city. ✨
                        </p>

                        <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                            <span class="px-3 py-1 bg-secondary text-primary text-[10px] font-bold rounded-lg border border-primary/10">#Photography</span>
                            <span class="px-3 py-1 bg-secondary text-primary text-[10px] font-bold rounded-lg border border-primary/10">#Architecture</span>
                            <span class="px-3 py-1 bg-secondary text-primary text-[10px] font-bold rounded-lg border border-primary/10">#UrbanExploring</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Profile Tabs -->
            <div class="flex items-center justify-around border-b border-gray-100 mb-6 px-4">
                <button class="pb-3 border-b-2 border-primary text-primary text-sm font-bold px-4 flex items-center space-x-2">
                    <i class="fa-solid fa-grid-2 text-base"></i>
                    <span>My Posts</span>
                </button>
                <button class="pb-3 border-b-2 border-transparent text-muted hover:text-dark text-sm font-semibold px-4 flex items-center space-x-2 transition-colors">
                    <i class="fa-solid fa-users text-base"></i>
                    <span>My Circles</span>
                </button>
            </div>

            <!-- Post Grid (Edge-to-Edge) -->
            <div class="grid grid-cols-3 gap-0 pb-10">
                <script>
                    for(let i=1; i<=12; i++) {
                        const imgIdx = (i % 8) + 1;
                        document.write(`
                            <div class="aspect-square relative group cursor-pointer overflow-hidden bg-gray-100 animate-fade-in" style="animation-delay: ${i*0.05}s">
                                <img src="images/post/pic${imgIdx}.png" alt="Post ${i}" class="w-full h-full object-cover transition-transform duration-700">
                                <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center space-x-4">
                                    <div class="text-white flex items-center space-x-1 font-bold">
                                        <i class="fa-solid fa-heart"></i>
                                        <span>${Math.floor(Math.random()*500)}</span>
                                    </div>
                                    <div class="text-white flex items-center space-x-1 font-bold">
                                        <i class="fa-solid fa-comment"></i>
                                        <span>${Math.floor(Math.random()*100)}</span>
                                    </div>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>

        </main>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav px-6 py-3 flex md:hidden items-center justify-between z-40 shadow-nav">
        <a href="index.html" class="text-gray-400 btn-scale"><i class="fa-solid fa-house text-2xl"></i></a>
        <a href="calendar.html" class="text-gray-400 btn-scale"><i class="fa-solid fa-calendar-days text-2xl"></i></a>
        <a href="create.html" class="text-gray-400 btn-scale"><i class="fa-regular fa-square-plus text-2xl"></i></a>
        <a href="#" class="text-gray-400 btn-scale"><i class="fa-solid fa-sitemap text-2xl"></i></a>
        <!-- Active -->
        <a href="profile.html" class="text-primary btn-scale relative">
            <img src="images/stories/small/pic9.jpg" alt="Profile" class="w-7 h-7 rounded-full border-2 border-primary">
            <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
        </a>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
